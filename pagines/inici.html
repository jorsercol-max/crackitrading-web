<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CrackiTrading — Iniciar sessió</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --cream:#fafaf7;--white:#ffffff;--yellow:#f5e642;--yellow2:#ede034;
      --grey-100:#f4f4f2;--grey-200:#e8e8e5;--grey-900:#1a1a17;
      --red:#c0392b;--font-body:'Instrument Sans',sans-serif;--font-mono:'DM Mono',monospace;--radius:10px;
    }
    body{min-height:100vh;background:var(--cream);font-family:var(--font-body);display:flex;flex-direction:column}
    nav{padding:20px 40px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--grey-200);background:var(--white)}
    .logo{font-size:18px;font-weight:700;color:var(--grey-900);display:flex;align-items:center;gap:8px;text-decoration:none}
    .logo-badge{background:var(--yellow);width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px}
    .page{flex:1;display:grid;grid-template-columns:1fr 1fr;min-height:calc(100vh - 62px)}
    .left{background:var(--grey-900);padding:64px;display:flex;flex-direction:column;justify-content:space-between;color:white}
    .left h2{font-size:40px;letter-spacing:-1.5px;line-height:1.1}
    .left h2 em{font-style:normal;background:var(--yellow);color:var(--grey-900);padding:0 5px;border-radius:3px}
    .right{display:flex;align-items:center;justify-content:center;padding:48px 40px}
    .form-box{width:100%;max-width:400px}
    .field{margin-bottom:20px}
    .field label{display:block;font-size:13px;font-weight:600;margin-bottom:7px}
    .field input{width:100%;padding:12px;border-radius:var(--radius);border:1.5px solid var(--grey-200);outline:none}
    .field input:focus{border-color:var(--yellow2)}
    .btn-submit{width:100%;padding:14px;background:var(--grey-900);color:white;border:none;border-radius:var(--radius);font-weight:600;cursor:pointer}
    .btn-back{display:block;text-align:center;margin-top:20px;font-size:14px;color:var(--grey-600);text-decoration:none}
    @media(max-width:768px){.left{display:none}.page{grid-template-columns:1fr}}
  </style>
</head>
<body>

<nav>
  <a href="javascript:void(0)" onclick="tornarLanding()" class="logo"><div class="logo-badge">⚡</div>CrackiTrading</a>
</nav>

<div class="page">
  <div class="left">
    <div>
      <div style="font-family:var(--font-mono); font-size:11px; opacity:0.4; letter-spacing:2px; margin-bottom:20px;">// ADMIN & CLIENT ACCESS</div>
      <h2>Accedeix al teu<br>panell <em>Cracki</em>Trading</h2>
      <p style="margin-top:20px; opacity:0.6;">Gestiona les teves claus API, revisa el PnL i configura el risc del bot.</p>
    </div>
    <div style="font-family:var(--font-mono); font-size:12px; opacity:0.3;">v2.0.1 build_atheneum</div>
  </div>

  <div class="right">
    <div class="form-box">
      <h1 style="font-size:26px; margin-bottom:10px;">Benvingut</h1>
      <p style="color:var(--grey-600); margin-bottom:30px; font-size:14px;">Identifica't per entrar al sistema.</p>

      <form id="loginForm">
        <div class="field">
          <label>Correu electrònic</label>
          <input type="email" id="email" placeholder="nom@exemple.com" required>
        </div>
        <div class="field">
          <label>Contrasenya</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-submit" id="btnSubmit">Entrar al panell</button>
      </form>
      
      <a href="javascript:void(0)" onclick="tornarLanding()" class="btn-back">← Tornar a la web</a>
    </div>
  </div>
</div>

<script>
  // Funció per tornar a la Landing sense carregar pàgina
  function tornarLanding() {
    window.parent.postMessage({ type: 'streamlit:setComponentValue', value: "GOTO_LANDING" }, '*');
  }

  // ENVIAMENT DE DADES AL PYTHON
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;
    const btn = document.getElementById('btnSubmit');

    btn.textContent = 'Verificant...';
    btn.disabled = true;

    // Enviem la combinació al app.py
    const credentials = email + "|" + pass;
    window.parent.postMessage({
      type: 'streamlit:setComponentValue',
      value: credentials
    }, '*');
    
    // Si falla, el Python ja ens mostrarà l'error, però reactivarem el botó passats 2 segons
    setTimeout(() => {
        btn.textContent = 'Entrar al panell';
        btn.disabled = false;
    }, 2000);
  });
</script>
</body>
</html>
